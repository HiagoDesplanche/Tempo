<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio Minimalista</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #121212;
            color: #fff;
            overflow: hidden;
        }

        /* Menu Minimalista */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 12px;
        }

        .tab {
            padding: 6px 14px;
            color: #888;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background: transparent;
            transition: 0.3s;
        }

        .active {
            background: #00d2ff;
            color: #000;
        }

        /* Relógio Compacto */
        .relogio {
            display: flex;
            gap: 10px;
        }

        .relogio div {
            background: #1e1e1e;
            width: 70px;  /* Reduzido */
            height: 70px; /* Reduzido */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .relogio span {
            font-size: 1.5rem; /* Números pequenos e nítidos */
            font-weight: bold;
        }

        .tempo {
            font-size: 0.5rem;
            color: #00d2ff;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* Seções */
        .conteudo { display: none; }
        .conteudo.ativo { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .secao-container {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            width: 300px; /* Bem mais estreito */
            text-align: center;
            border: 1px solid #333;
        }

        h3 { font-size: 0.9rem; margin-bottom: 12px; color: #eee; }

        /* Planos de Vida Estilizados */
        .meta-item { margin-bottom: 10px; text-align: left; }
        .meta-label { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 4px; }
        .barra { height: 4px; background: #333; border-radius: 4px; overflow: hidden; }
        .prog { height: 100%; background: #00d2ff; width: 0%; transition: 1s; }

        /* Controles */
        input[type="time"] {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            padding: 5px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .btn {
            padding: 5px 12px;
            font-size: 0.7rem;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin: 2px;
        }

        .btn-ok { background: #00d2ff; color: #000; }
        .btn-del { background: #ff4d4d; color: #fff; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab active" onclick="mudarGuia(this, 'relogio')">RELÓGIO</button>
        <button class="tab" onclick="mudarGuia(this, 'planos')">PLANOS</button>
        <button class="tab" onclick="mudarGuia(this, 'alarme')">ALARME</button>
        <button class="tab" onclick="mudarGuia(this, 'cronometro')">CRONO</button>
    </div>

    <div class="conteudo ativo" id="relogio">
        <div class="relogio">
            <div><span id="h">00</span><span class="tempo">HRS</span></div>
            <div><span id="m">00</span><span class="tempo">MIN</span></div>
            <div><span id="s">00</span><span class="tempo">SEG</span></div>
        </div>
    </div>

    <div class="conteudo" id="planos">
        <div class="secao-container">
            <h3>PLANOS DE VIDA</h3>
            <div class="meta-item">
                <div class="meta-label">Estudos<span>80%</span></div>
                <div class="barra"><div class="prog" style="width: 80%"></div></div>
            </div>
            <div class="meta-item">
                <div class="meta-label">Finanças<span>45%</span></div>
                <div class="barra"><div class="prog" style="width: 45%; background: #9d50bb"></div></div>
            </div>
        </div>
    </div>

    <div class="conteudo" id="alarme">
        <div class="secao-container">
            <h3>ALARME</h3>
            <input type="time" id="valAlarme">
            <br>
            <button class="btn btn-ok" onclick="setAlarme()">DEFINIR</button>
            <button class="btn btn-del" onclick="limparAlarme()">LIMPAR</button>
            <p id="status" style="font-size: 0.65rem; margin-top: 8px; color: #00d2ff;"></p>
        </div>
    </div>

    <div class="conteudo" id="cronometro">
        <div class="secao-container">
            <h3 id="display">00:00:00</h3>
            <button class="btn btn-ok" onclick="start()">INICIAR</button>
            <button class="btn" style="background:#444; color:#fff" onclick="pause()">PAUSAR</button>
            <button class="btn btn-del" onclick="reset()">ZERAR</button>
        </div>
    </div>

    <script>
        function mudarGuia(btn, id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.conteudo').forEach(c => c.classList.remove('ativo'));
            btn.classList.add('active');
            document.getElementById(id).classList.add('ativo');
        }

        let alarme = null;
        function atualizar() {
            const d = new Date();
            const hrs = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            const seg = String(d.getSeconds()).padStart(2, '0');
            
            document.getElementById('h').innerText = hrs;
            document.getElementById('m').innerText = min;
            document.getElementById('s').innerText = seg;

            if(`${hrs}:${min}` === alarme) {
                alert("Alarme!");
                alarme = null;
                document.getElementById('status').innerText = "";
            }
        }
        setInterval(atualizar, 1000);

        function setAlarme() {
            alarme = document.getElementById('valAlarme').value;
            document.getElementById('status').innerText = "Ativo: " + alarme;
        }

        function limparAlarme() {
            alarme = null;
            document.getElementById('status').innerText = "";
        }

        let t, s = 0;
        function start() { if(!t) t = setInterval(() => { s++; 
            let h = Math.floor(s/3600), m = Math.floor((s%3600)/60), seg = s%60;
            document.getElementById('display').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(seg).padStart(2,'0')}`;
        }, 1000); }
        function pause() { clearInterval(t); t = null; }
        function reset() { pause(); s = 0; document.getElementById('display').innerText = "00:00:00"; }
    </script>
</body>
</html>
